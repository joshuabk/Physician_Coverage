<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PhysicianCoverage{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f1b2d; --navy-2: #1a2d47; --navy-3: #243d61;
      --teal: #00b8a9; --teal-light: #00d4c3;
      --amber: #f5a623; --red: #e05454; --green: #2ec27e; --purple: #9b7fe8;
      --text: #e8edf4; --text-2: #94a8c0; --text-3: #5c7a99;
      --border: rgba(255,255,255,0.07); --border-2: rgba(255,255,255,0.13);
      --card: rgba(255,255,255,0.04); --card-hover: rgba(255,255,255,0.07);
      --radius: 10px; --radius-lg: 16px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.15s; border: 1px solid transparent; }
    .btn-primary { background: var(--teal); color: var(--navy); border-color: var(--teal); }
    .btn-primary:hover { background: var(--teal-light); }
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { display: block; font-size: 12.5px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
    .form-control { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-2); border-radius: 7px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 8px 12px; transition: border-color 0.15s; outline: none; }
    .form-control:focus { border-color: var(--teal); }
    h1 { font-size: 22px; font-weight: 600; color: var(--text); }
    .text-muted { color: var(--text-3); }
    .text-sm { font-size: 12.5px; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
